<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARISTXCLESS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ash:#0a0908;
    --void:#050403;
    --smoke:#171412;
    --card:#1d1815;
    --bone:#e9e2d3;
    --bone-dim:#a89c88;
    --oxide:#8a2418;
    --oxide-bright:#c73a26;
    --brass:#7a6a4a;
    --violet:#3a1f3d;
    --line:#332c25;
    --split-a:#c73a26;
    --split-b:#2fb8c9;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--ash);
    color:var(--bone);
    font-family:'IBM Plex Mono', monospace;
    line-height:1.7;
    overflow-x:hidden;
  }
  canvas#noise{
    position:fixed; inset:0; width:100%; height:100%;
    opacity:0.05; pointer-events:none; z-index:1; mix-blend-mode:overlay;
  }
  .vignette{
    position:fixed; inset:0; pointer-events:none; z-index:2;
    background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.78) 100%);
  }
  /* halftone duotone dot field */
  .halftone{
    position:fixed; inset:0; pointer-events:none; z-index:1;
    opacity:0.5;
    background-image:
      radial-gradient(circle, rgba(199,58,38,0.5) 0.9px, transparent 0.9px),
      radial-gradient(circle, rgba(58,31,61,0.55) 0.9px, transparent 0.9px);
    background-size:5px 5px, 5px 5px;
    background-position:0 0, 2.5px 2.5px;
    mix-blend-mode:screen;
  }
  main{position:relative; z-index:3;}

  /* NAV */
  nav.menu{
    position:fixed; top:0; left:0; right:0; z-index:20;
    display:flex; justify-content:flex-end; gap:2rem;
    padding:1.4rem 1.6rem;
    background:linear-gradient(to bottom, rgba(10,9,8,0.85), transparent);
  }
  nav.menu a{
    font-family:'Metal Mania', cursive;
    font-size:1rem;
    letter-spacing:0.06em;
    color:var(--bone-dim);
    text-decoration:none;
    transition:color 0.2s ease;
  }
  nav.menu a:hover{ color:var(--oxide-bright); }

  /* HERO */
  .hero{
    min-height:100svh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:2rem 1.25rem;
    position:relative;
    border-bottom:1px solid var(--line);
  }
  .hero::before{
    content:"";
    position:absolute; top:50%; left:50%; width:140vw; height:140vw;
    max-width:900px; max-height:900px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(138,36,24,0.18) 0%, rgba(58,31,61,0.1) 45%, transparent 65%);
    z-index:-1;
  }
  .logo-wrap{
    position:relative;
    width:min(78vw, 420px);
    cursor:default;
  }
  .logo-wrap img{
    display:block; width:100%; height:auto;
    filter:drop-shadow(0 0 34px rgba(199,58,38,0.35));
    animation:idle-glitch 7s infinite;
  }
  @keyframes idle-glitch{
    0%, 92%, 100%{ filter:drop-shadow(0 0 34px rgba(199,58,38,0.35)); transform:translate(0,0); }
    93%{ filter:drop-shadow(2px 0 0 var(--split-a)) drop-shadow(-2px 0 0 var(--split-b)); transform:translate(-1px,0); }
    94%{ filter:drop-shadow(-3px 0 0 var(--split-a)) drop-shadow(3px 0 0 var(--split-b)); transform:translate(1px,0); }
    95%{ filter:drop-shadow(2px 1px 0 var(--split-a)) drop-shadow(-2px -1px 0 var(--split-b)); transform:translate(-1px,1px); }
    96%{ filter:drop-shadow(0 0 34px rgba(199,58,38,0.35)); transform:translate(0,0); }
  }
  .logo-wrap:hover img{
    animation:hover-glitch 0.5s steps(2,end) infinite;
  }
  @keyframes hover-glitch{
    0%{ filter:drop-shadow(2px 0 0 var(--split-a)) drop-shadow(-2px 0 0 var(--split-b)); transform:translate(-1px,0); }
    50%{ filter:drop-shadow(-2px 0 0 var(--split-a)) drop-shadow(2px 0 0 var(--split-b)); transform:translate(1px,0); }
    100%{ filter:drop-shadow(2px 0 0 var(--split-a)) drop-shadow(-2px 0 0 var(--split-b)); transform:translate(-1px,0); }
  }
  .hero-rule{
    margin-top:2rem;
    width:1px; height:48px;
    background:linear-gradient(var(--oxide), transparent);
  }

  section{ padding:5rem 1.4rem; max-width:640px; margin:0 auto; }
  .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.3em;
    color:var(--brass);
    text-transform:uppercase;
    margin-bottom:1.4rem;
    display:flex; align-items:center; gap:0.8rem;
  }
  .label::after{ content:""; flex:1; height:1px; background:var(--line); }

  .socials{ display:flex; flex-direction:column; gap:0; }
  .social-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:1.2rem 0; border-bottom:1px solid var(--line);
    text-decoration:none; color:var(--bone);
    transition:padding-left 0.2s ease, color 0.2s ease;
  }
  .social-row:hover{ padding-left:0.5rem; color:var(--oxide-bright); }
  .social-row .name{
    font-family:'Metal Mania', cursive;
    font-size:1.35rem;
    letter-spacing:0.03em;
  }
  .social-row .handle{ font-family:'IBM Plex Mono', monospace; font-size:0.78rem; color:var(--bone-dim); }

  .donate-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:2px;
    padding:2rem 1.6rem;
    text-align:center;
  }
  .wallet-box{
    background:var(--ash);
    border:1px solid var(--line);
    border-radius:2px;
    padding:0.9rem 1rem;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.78rem;
    color:var(--bone-dim);
    word-break:break-all;
    display:flex; align-items:center; justify-content:space-between;
    gap:0.8rem;
    margin-bottom:0.9rem;
  }
  .wallet-box .addr{ text-align:left; direction:ltr; flex:1; }
  .copy-btn{
    background:transparent;
    border:1px solid var(--brass);
    color:var(--bone);
    font-family:'IBM Plex Mono', monospace;
    font-size:0.7rem;
    padding:0.5rem 0.9rem;
    border-radius:2px;
    cursor:pointer;
    letter-spacing:0.08em;
    white-space:nowrap;
    transition:background 0.2s ease, color 0.2s ease;
  }
  .copy-btn:hover{ background:var(--oxide); border-color:var(--oxide); }
  .copy-btn:focus-visible, a:focus-visible{
    outline:2px solid var(--oxide-bright); outline-offset:3px;
  }
  .network-tag{
    display:inline-block; font-family:'IBM Plex Mono', monospace;
    font-size:0.65rem; color:var(--brass); letter-spacing:0.2em;
    text-transform:uppercase; margin-bottom:0.7rem;
  }

  footer{
    text-align:center; padding:3rem 1.4rem 4rem;
    font-family:'Metal Mania', cursive;
    color:var(--brass); font-size:1rem; letter-spacing:0.05em;
  }

  @media (prefers-reduced-motion: reduce){
    .logo-wrap img, .logo-wrap:hover img{ animation:none; }
    html{ scroll-behavior:auto; }
  }
</style>
</head>
<body>
<canvas id="noise"></canvas>
<div class="halftone"></div>
<div class="vignette"></div>

<nav class="menu">
  <a href="#links">LINKS</a>
  <a href="#support">SUPPORT</a>
</nav>

<main>
  <div class="hero">
    <div class="logo-wrap">
      <img src="assets/logo.png" alt="ARISTXCLESS">
    </div>
    <div class="hero-rule"></div>
  </div>

  <section id="links">
    <div class="label">LINKS</div>
    <div class="socials">
      <!-- replace href="#" with real profile URLs -->
      <a class="social-row" href="#" target="_blank" rel="noopener">
        <span class="name">SPOTIFY</span>
        <span class="handle">@aristxcless</span>
      </a>
      <a class="social-row" href="#" target="_blank" rel="noopener">
        <span class="name">SOUNDCLOUD</span>
        <span class="handle">@aristxcless</span>
      </a>
      <a class="social-row" href="#" target="_blank" rel="noopener">
        <span class="name">INSTAGRAM</span>
        <span class="handle">@aristxcless</span>
      </a>
      <a class="social-row" href="#" target="_blank" rel="noopener">
        <span class="name">YOUTUBE</span>
        <span class="handle">@aristxcless</span>
      </a>
      <a class="social-row" href="#" target="_blank" rel="noopener">
        <span class="name">TELEGRAM</span>
        <span class="handle">@aristxcless</span>
      </a>
    </div>
  </section>

  <section id="support">
    <div class="label">SUPPORT</div>
    <div class="donate-card">
      <div class="network-tag">USDT · TRC20</div>
      <div class="wallet-box">
        <span class="addr" id="wallet-addr">YOUR-WALLET-ADDRESS-HERE</span>
        <button class="copy-btn" onclick="copyWallet()">COPY</button>
      </div>
    </div>
  </section>

  <footer>ARISTXCLESS © 2026</footer>
</main>

<script>
function copyWallet(){
  const text = document.getElementById('wallet-addr').innerText;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector('.copy-btn');
    const old = btn.innerText;
    btn.innerText = 'COPIED';
    setTimeout(()=>{ btn.innerText = old; }, 1500);
  });
}

// ambient grain animation
const canvas = document.getElementById('noise');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function drawNoise(){
  const w = canvas.width, h = canvas.height;
  const imgData = ctx.createImageData(w, h);
  const buffer = new Uint32Array(imgData.data.buffer);
  for(let i=0; i<buffer.length; i++){
    const v = (Math.random()*255)|0;
    buffer[i] = (255<<24) | (v<<16) | (v<<8) | v;
  }
  ctx.putImageData(imgData, 0, 0);
}
let last = 0;
function loop(ts){
  if(ts - last > 90){ drawNoise(); last = ts; }
  requestAnimationFrame(loop);
}
if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
